<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Checkin URL Generator</title>
	<style>
		body {
			background: #ccc;
			font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
			text-align: center;
		}
		select, button {
			font-size: 20px;
			min-width: 60px;
			padding: 5px 10px;
		}
		output {
			margin: 10px 0;
			border-radius: 10px;
			border: 1px solid rgb(189, 144, 11);
			display: block;
			padding: 10px 20px;
			font-size: 18px;
			background: rgb(231, 218, 183);
		}
	</style>
</head>
<body>
	<h2>CHECKIN URL Generator</h2>
	<div>
		<select id="lang">
			<option>EN</option>
			<option>VI</option>
		</select>
		<select id="room">
			<option value="2">201</option>
			<option value="3">301</option>
			<option value="4">401</option>
			<option value="5">501</option>
			<option value="6">601</option>
			<option value="7">701</option>
		</select>

		<select id="lock">
			<option value="P">Hami.P</option>
			<option value="A">Hami.A</option>
		</select>
	</div>
	<output id="url"></output>
	<div>
		<button id="copy">COPY</button>
	</div>

<script>
	(() => {
		const baseUrl = 'http://iphong.github.io/hami-lakeview-service-apartment/instructions'
		const room = document.getElementById('room')
		const lang = document.getElementById('lang')
		const lock = document.getElementById('lock')
		const output = document.getElementById('url')
		const copyBtn = document.getElementById('copy')

		const render = () => {
			output.textContent = `${baseUrl}?room=${room.value}&lock=${lock.value}&lang=${lang.value}`
		}

		const flash = (text) => {
			const prev = copyBtn.textContent
			copyBtn.textContent = text
			setTimeout(() => (copyBtn.textContent = prev), 1200)
		}

		const copyToClipboard = async () => {
			try {
				await navigator.clipboard.writeText(output.textContent)
				flash('COPIED')
			} catch {
				alert('Failed to copy to clipboard')
			}
		}
		
		lang.addEventListener('change', render)
		room.addEventListener('change', render)
		lock.addEventListener('change', render)
		copyBtn.addEventListener('click', copyToClipboard)

		render()
	})()
</script>
</body>
</html>
